name: Baballe Jaji Backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            PROJECT_DIR="${{ secrets.PROJECT_PATH }}"
            SSH_USER="${{ secrets.VPS_USER }}"
            PAT_SECRET="${{ secrets.GITHUB_PAT }}"
            
            sudo chown -R $SSH_USER:$SSH_USER $PROJECT_DIR
            cd $PROJECT_DIR
            
            git config --global --add safe.directory $PROJECT_DIR
            
            git remote set-url origin https://github.com/nubixlabs/baballejaji-limited-backend.git
            
            git config credential.helper "echo username=nubixlabs\npassword=$PAT_SECRET"
            
            git pull origin main
            
            
            
            echo "Deployment successful!"