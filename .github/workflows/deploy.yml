name: Baballe Jaji Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            export GIT_TERMINAL_PROMPT=0

            PROJECT_DIR="${{ secrets.PROJECT_PATH }}"
            PAT_SECRET="${{ secrets.REPO_PAT }}"

            echo "➡️ Switching to project directory"
            cd "$PROJECT_DIR"

            echo "➡️ Mark repo as safe"
            git config --global --add safe.directory "$PROJECT_DIR"

            echo "➡️ Ensure clean HTTPS remote"
            git remote set-url origin https://github.com/nubixlabs/baballejaji-limited-backend.git

            echo "➡️ Pulling latest code"
            git -c http.extraheader="AUTHORIZATION: basic $(printf '%s' "nubixlabs:$PAT_SECRET" | base64)" pull origin main

            echo "➡️ PRE-DEPLOY: Preparing directories and permissions"
            # Ensure all required Laravel directories exist before composer touches them
            mkdir -p storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache
            
            # Remove immutable flags (if your VPS uses them)
            sudo chattr -R -i storage bootstrap/cache || true

            # Grant the current SSH user and the web group ownership
            # Note: Change 'www' to 'www-data' if you are on a standard Ubuntu/Nginx setup
            sudo chown -R $USER:www storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "➡️ Installing composer dependencies"
            # This will now succeed because bootstrap/cache is writable
            composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "➡️ Running database migrations"
            php artisan migrate --force

            echo "➡️ Clearing Laravel caches"
            php artisan optimize:clear || true

            echo "➡️ POST-DEPLOY: Finalizing permissions"
            # Ensure the web server user (www) owns the storage for runtime writing
            sudo chown -R www:www storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            
            # Ensure log file is specifically writable
            sudo touch storage/logs/laravel.log
            sudo chown www:www storage/logs/laravel.log
            sudo chmod 664 storage/logs/laravel.log

            echo "➡️ Restarting queue workers"
            php artisan queue:restart || true

            echo "✅ Deployment successful!"