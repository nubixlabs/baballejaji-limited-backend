name: Baballe Jaji Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            export GIT_TERMINAL_PROMPT=0

            PROJECT_DIR="${{ secrets.PROJECT_PATH }}"
            PAT_SECRET="${{ secrets.REPO_PAT }}"

            echo "➡️ Switching to project directory"
            cd "$PROJECT_DIR"

            echo "➡️ Mark repo as safe"
            git config --global --add safe.directory "$PROJECT_DIR"

            echo "➡️ Ensure clean HTTPS remote"
            git remote set-url origin https://github.com/nubixlabs/baballejaji-limited-backend.git

            echo "➡️ Pulling latest code"
            git -c http.extraheader="AUTHORIZATION: basic $(printf '%s' "nubixlabs:$PAT_SECRET" | base64)" pull origin main

            echo "➡️ Installing composer dependencies"
            composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "➡️ Running database migrations"
            php artisan migrate --force

            echo "➡️ Clearing Laravel caches (safe mode)"
            php artisan optimize:clear || true

            echo "➡️ Fixing Laravel permissions (CRITICAL)"
            # Remove immutable flags (some VPS panels enable this)
            sudo chattr -R -i storage bootstrap/cache || true

            # Set correct ownership for PHP-FPM / Nginx user
            sudo chown -R www:www storage bootstrap/cache

            # Directories: rwx for owner & group
            sudo find storage bootstrap/cache -type d -exec chmod 775 {} \;

            # Files: rw for owner & group
            sudo find storage bootstrap/cache -type f -exec chmod 664 {} \;

            # Ensure required directories exist
            mkdir -p storage/logs storage/framework/cache/data

            # Ensure Laravel log file exists and is writable
            sudo touch storage/logs/laravel.log
            sudo chown www:www storage/logs/laravel.log
            sudo chmod 664 storage/logs/laravel.log

            echo "➡️ Restarting queue workers"
            php artisan queue:restart || true

            echo "✅ Deployment successful!"
