name: Baballe Jaji Backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Navigate to the project directory
            cd ${{ secrets.PROJECT_PATH }}
            
            # 2. Add the repository directory as a safe exception for the current user
            #    This resolves the "dubious ownership" fatal error.
            git config --global --add safe.directory ${{ secrets.PROJECT_PATH }}
            
            # 3. Pull the latest code
            git pull origin main
            
            # 4. Add your post-deployment commands here (e.g., install, build, restart)
            # npm install
            # npm run build
            # /www/server/panel/pyenv/bin/pm2 reload my-nextjs-app --update-env