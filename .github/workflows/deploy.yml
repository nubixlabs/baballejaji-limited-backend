name: Baballe Jaji Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            export GIT_TERMINAL_PROMPT=0

            PROJECT_DIR="${{ secrets.PROJECT_PATH }}"
            SSH_USER="${{ secrets.VPS_USER }}"
            PAT_SECRET="${{ secrets.REPO_PAT }}"

            echo "➡️ Switching to project directory"
            sudo chown -R "$SSH_USER":"$SSH_USER" "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "➡️ Mark repo as safe"
            git config --global --add safe.directory "$PROJECT_DIR"

            echo "➡️ Ensure clean HTTPS remote"
            git remote set-url origin https://github.com/nubixlabs/baballejaji-limited-backend.git

            echo "➡️ Pulling latest code"
            git -c http.extraheader="AUTHORIZATION: basic $(printf '%s' "nubixlabs:$PAT_SECRET" | base64)" pull origin main

            echo "➡️ Installing composer dependencies"
            composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "➡️ Running database migrations"
            php artisan migrate --force

            echo "➡️ Clearing and caching config/routes/views"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "➡️ Setting storage permissions"
            chmod -R 775 storage bootstrap/cache

            echo "➡️ Restarting queue workers"
            php artisan queue:restart || true

            echo "✅ Deployment successful!"
